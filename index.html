<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>INTJ能量板 · Energy To-Do</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600;700&family=Noto+Sans+SC:wght@400;500;700&family=ZCOOL+KuaiLe&display=swap" rel="stylesheet" />
  <style>
/* ============================================================
   能量待办 · Energy To-Do  —  Design Tokens & Base
   暖奶油底 + 翠绿(增能)/琥珀(能量)/珊瑚(耗能)，活力明亮、温柔陪伴
   ============================================================ */

:root {
  /* --- surfaces (macaron soft) --- */
  --bg:        #F7F1F3;   /* soft pink-cream */
  --bg-2:      #EFE6EB;
  --surface:   #FFFFFF;
  --surface-2: #FCF8FA;
  --line:      #EFE3EA;
  --line-2:    #E5D6DF;

  /* --- ink --- */
  --ink:    #4A3F46;
  --ink-2:  #8A7C84;
  --ink-3:  #B3A6AE;

  /* --- energy / gain (macaron pistachio) --- */
  --gain:      #5FB892;
  --gain-2:    #A6E0C6;
  --gain-3:    #C7EEDC;
  --gain-tint: #E9F7F0;

  /* --- energy meter (macaron lemon) --- */
  --amber:     #E7B255;
  --amber-2:   #F6DCA0;
  --amber-tint:#FBF1DA;

  /* --- drain (macaron rose) --- */
  --drain:     #EB8299;
  --drain-2:   #F4B2C1;
  --drain-tint:#FBE8EE;

  /* --- macaron category swatches (categories now carry their own hex) --- */
  --c-study:  #B7BFEE;
  --c-move:   #A6E0C8;
  --c-social: #F3A8BE;
  --c-hobby:  #F4DC97;
  --c-life:   #C7E6A2;
  --c-work:   #A7D6EC;
  --c-chore:  #D7C3AE;

  /* --- radii --- */
  --r-xs: 10px;
  --r-sm: 14px;
  --r-md: 20px;
  --r-lg: 28px;
  --r-xl: 36px;
  --r-pill: 999px;

  /* --- shadow (soft, lightly tinted) --- */
  --sh-sm: 0 2px 8px rgba(120,80,100,0.06);
  --sh-md: 0 8px 24px rgba(120,80,100,0.09);
  --sh-lg: 0 18px 48px rgba(120,80,100,0.14);
  --sh-glow: 0 12px 36px rgba(95,184,146,0.32);

  --font-disp: 'Fredoka', 'Noto Sans SC', sans-serif;
  --font-body: 'Noto Sans SC', 'Fredoka', sans-serif;
  --font-round: 'ZCOOL KuaiLe', 'Fredoka', sans-serif;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

html, body { height: 100%; }

body {
  font-family: var(--font-body);
  color: var(--ink);
  background: var(--bg);
  -webkit-font-smoothing: antialiased;
  text-rendering: optimizeLegibility;
  overflow: hidden;
}

#root { height: 100vh; }

button { font-family: inherit; cursor: pointer; border: none; background: none; color: inherit; }
input, textarea, select { font-family: inherit; color: inherit; }
::selection { background: var(--gain-3); }

/* scrollbar */
.scroll::-webkit-scrollbar { width: 10px; height: 10px; }
.scroll::-webkit-scrollbar-thumb { background: var(--line-2); border-radius: 999px; border: 3px solid transparent; background-clip: padding-box; }
.scroll::-webkit-scrollbar-thumb:hover { background: var(--ink-3); background-clip: padding-box; }

/* ============================================================
   APP SHELL
   ============================================================ */
.app {
  display: grid;
  grid-template-columns: 248px 1fr;
  height: 100vh;
  background:
    radial-gradient(900px 600px at 12% -8%, rgba(166,224,200,0.30), transparent 60%),
    radial-gradient(820px 600px at 105% 4%, rgba(243,168,190,0.26), transparent 55%),
    radial-gradient(700px 600px at 60% 110%, rgba(183,191,238,0.22), transparent 55%),
    var(--bg);
}

/* ---- sidebar ---- */
.sidebar {
  display: flex;
  flex-direction: column;
  padding: 26px 18px;
  gap: 6px;
  border-right: 1px solid var(--line);
  background: rgba(255,255,255,0.5);
  backdrop-filter: blur(8px);
}
.brand {
  display: flex;
  align-items: center;
  gap: 11px;
  padding: 4px 10px 22px;
}
.brand-mark {
  width: 38px; height: 38px;
  border-radius: 12px;
  background: radial-gradient(circle at 38% 32%, var(--gain-3), var(--gain) 78%);
  box-shadow: 0 6px 16px rgba(27,158,115,0.35), inset 0 2px 5px rgba(255,255,255,0.5);
  display: grid; place-items: center;
  flex-shrink: 0;
}
.brand-mark::after { content: ""; width: 8px; height: 8px; border-radius: 50%; background: rgba(255,255,255,0.9); margin: -10px 0 0 -8px; box-shadow: 0 0 8px rgba(255,255,255,0.8); }
.brand-name { font-family: var(--font-round); font-size: 19px; color: var(--ink); letter-spacing: .5px; }
.brand-sub { font-size: 11px; color: var(--ink-3); letter-spacing: 2px; font-family: var(--font-disp); }

.nav-item {
  display: flex; align-items: center; gap: 13px;
  padding: 11px 14px;
  border-radius: var(--r-sm);
  color: var(--ink-2);
  font-size: 15px; font-weight: 500;
  transition: background .18s, color .18s, transform .12s;
  text-align: left; width: 100%;
}
.nav-item:hover { background: rgba(255,255,255,0.7); color: var(--ink); }
.nav-item.active { background: var(--ink); color: #fff; box-shadow: var(--sh-sm); }
.nav-item.active .nav-ic { opacity: 1; }
.nav-ic { width: 20px; height: 20px; opacity: .8; flex-shrink: 0; }

.side-spacer { flex: 1; }

.side-mini {
  margin-top: 8px;
  padding: 14px;
  border-radius: var(--r-md);
  background: var(--surface);
  border: 1px solid var(--line);
  box-shadow: var(--sh-sm);
}
.side-mini-row { display: flex; align-items: center; gap: 10px; }
.side-mini-val { font-family: var(--font-disp); font-weight: 600; font-size: 22px; line-height: 1; }
.side-mini-lab { font-size: 11px; color: var(--ink-3); margin-top: 3px; }

/* ---- main ---- */
.main { overflow-y: auto; overflow-x: hidden; height: 100vh; }
.main-inner { max-width: 1080px; margin: 0 auto; padding: 38px 48px 80px; }

.topbar { display: flex; align-items: flex-end; justify-content: space-between; margin-bottom: 30px; }
.greeting { font-family: var(--font-round); font-size: 30px; color: var(--ink); }
.subgreet { color: var(--ink-2); font-size: 14px; margin-top: 6px; }
.date-pill { font-family: var(--font-disp); font-size: 13px; color: var(--ink-2); background: var(--surface); border: 1px solid var(--line); padding: 8px 15px; border-radius: var(--r-pill); box-shadow: var(--sh-sm); }

/* ============================================================
   BUTTONS
   ============================================================ */
.btn {
  display: inline-flex; align-items: center; justify-content: center; gap: 8px;
  padding: 11px 20px;
  border-radius: var(--r-pill);
  font-weight: 600; font-size: 14px;
  transition: transform .12s, box-shadow .18s, background .18s, opacity .18s;
}
.btn:active { transform: scale(0.96); }
.btn-primary { background: var(--ink); color: #fff; box-shadow: var(--sh-sm); }
.btn-primary:hover { box-shadow: var(--sh-md); }
.btn-gain { background: var(--gain); color: #fff; box-shadow: var(--sh-glow); }
.btn-gain:hover { background: var(--gain); filter: brightness(1.05); }
.btn-ghost { background: var(--surface); color: var(--ink); border: 1px solid var(--line-2); }
.btn-ghost:hover { background: var(--surface-2); border-color: var(--ink-3); }
.btn-sm { padding: 8px 14px; font-size: 13px; }
.btn-lg { padding: 14px 26px; font-size: 15px; }

.icon-btn { width: 40px; height: 40px; border-radius: 50%; display: grid; place-items: center; background: var(--surface); border: 1px solid var(--line); box-shadow: var(--sh-sm); transition: transform .12s, box-shadow .18s; }
.icon-btn:hover { box-shadow: var(--sh-md); transform: translateY(-1px); }
.icon-btn:active { transform: scale(0.94); }

/* ============================================================
   CARD
   ============================================================ */
.card {
  background: var(--surface);
  border: 1px solid var(--line);
  border-radius: var(--r-lg);
  box-shadow: var(--sh-sm);
}
.card-pad { padding: 24px; }
.card-title { font-size: 16px; font-weight: 700; color: var(--ink); }
.card-sub { font-size: 13px; color: var(--ink-3); margin-top: 2px; }

/* ============================================================
   CHIPS / TAGS
   ============================================================ */
.chip {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 4px 11px; border-radius: var(--r-pill);
  font-size: 12px; font-weight: 600;
  background: var(--bg-2); color: var(--ink-2);
}
.chip-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }

.delta {
  font-family: var(--font-disp); font-weight: 600;
  display: inline-flex; align-items: center; gap: 3px;
  padding: 3px 11px; border-radius: var(--r-pill); font-size: 14px;
}
.delta-gain { color: var(--gain); background: var(--gain-tint); }
.delta-drain { color: var(--drain); background: var(--drain-tint); }

/* ============================================================
   TASK ITEM
   ============================================================ */
.task {
  display: flex; align-items: center; gap: 15px;
  padding: 15px 18px;
  border-radius: var(--r-md);
  background: var(--surface);
  border: 1px solid var(--line);
  transition: transform .14s, box-shadow .18s, border-color .18s, opacity .25s;
}
.task:hover { box-shadow: var(--sh-md); transform: translateY(-2px); border-color: var(--line-2); }
.task.done { opacity: 0.58; }
.task.done .task-title { text-decoration: line-through; text-decoration-color: var(--ink-3); }

.check {
  width: 26px; height: 26px; border-radius: 50%;
  border: 2.4px solid var(--line-2);
  flex-shrink: 0; position: relative;
  transition: border-color .18s, background .18s, transform .12s;
}
.check:hover { transform: scale(1.12); }
.check.gain { border-color: var(--gain-2); }
.check.drain { border-color: var(--drain-2); }
.check.checked.gain { background: var(--gain); border-color: var(--gain); }
.check.checked.drain { background: var(--drain); border-color: var(--drain); }
.check.checked::after {
  content: ""; position: absolute; left: 8px; top: 4px;
  width: 6px; height: 11px; border: solid #fff; border-width: 0 2.6px 2.6px 0;
  transform: rotate(42deg);
}
.task-body { flex: 1; min-width: 0; }
.task-title { font-size: 15px; font-weight: 500; color: var(--ink); }
.task-meta { display: flex; align-items: center; gap: 9px; margin-top: 6px; }
.task-time { font-size: 12px; color: var(--ink-3); font-family: var(--font-disp); }
.task-act:hover { background: var(--bg-2); color: var(--ink); }

/* type stripe */
.task-stripe { width: 4px; align-self: stretch; border-radius: 999px; flex-shrink: 0; }
.stripe-gain { background: linear-gradient(var(--gain-2), var(--gain)); }
.stripe-drain { background: linear-gradient(var(--drain-2), var(--drain)); }

/* ============================================================
   SEGMENTED CONTROL (home variant switcher)
   ============================================================ */
.seg {
  display: inline-flex; padding: 4px; gap: 3px;
  background: var(--surface); border: 1px solid var(--line);
  border-radius: var(--r-pill); box-shadow: var(--sh-sm);
}
.seg-btn {
  padding: 8px 16px; border-radius: var(--r-pill);
  font-size: 13px; font-weight: 600; color: var(--ink-2);
  transition: background .18s, color .18s;
  white-space: nowrap;
}
.seg-btn.active { background: var(--ink); color: #fff; }
.seg-btn:not(.active):hover { color: var(--ink); }

/* ============================================================
   CATEGORY PICKER
   ============================================================ */
.cat-pick {
  display: inline-flex; align-items: center; gap: 7px;
  padding: 8px 12px; border-radius: var(--r-pill);
  font-size: 13px; font-weight: 600; color: var(--ink);
  background: var(--surface); border: 1px solid var(--line-2);
  transition: border-color .15s, background .15s;
}
.cat-pick:hover { border-color: var(--ink-3); }
.cat-pop {
  position: absolute; z-index: 30; top: calc(100% + 6px); left: 0;
  min-width: 160px; max-height: 240px; overflow-y: auto;
  background: var(--surface); border: 1px solid var(--line);
  border-radius: var(--r-md); box-shadow: var(--sh-lg);
  padding: 6px; display: flex; flex-direction: column; gap: 2px;
  animation: pop .18s ease;
}
.cat-pop-item {
  display: flex; align-items: center; gap: 9px;
  padding: 9px 11px; border-radius: var(--r-sm);
  font-size: 14px; font-weight: 500; color: var(--ink);
  transition: background .14s;
}
.cat-pop-item:hover { background: var(--bg-2); }

/* ============================================================
   SUMMARY
   ============================================================ */
.link-back {
  display: inline-flex; align-items: center; gap: 4px;
  font-size: 14px; font-weight: 600; color: var(--ink-2);
  padding: 8px 12px; border-radius: var(--r-pill);
  transition: background .15s, color .15s;
}
.link-back:hover { background: var(--surface); color: var(--ink); }
.month-card:hover { transform: translateY(-3px); box-shadow: var(--sh-md) !important; }

/* ============================================================
   ENERGY NUMBER
   ============================================================ */
.energy-num { font-family: var(--font-disp); font-weight: 600; line-height: 0.9; letter-spacing: -1px; }

/* ============================================================
   MODAL
   ============================================================ */
.overlay {
  position: fixed; inset: 0; z-index: 60;
  background: rgba(44,42,36,0.32);
  backdrop-filter: blur(4px);
  display: grid; place-items: center;
  padding: 32px;
  animation: fade .2s ease;
}
.modal {
  width: 100%; max-width: 480px;
  background: var(--surface);
  border-radius: var(--r-xl);
  box-shadow: var(--sh-lg);
  overflow: hidden;
  animation: pop .26s cubic-bezier(.2,.9,.3,1.3);
}
@keyframes fade { from { opacity: 0; } }
@keyframes pop { from { opacity: 0; transform: translateY(14px) scale(0.97); } }

/* ============================================================
   ANIMATIONS
   ============================================================ */
@keyframes floaty { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-9px); } }
@keyframes pulseGlow { 0%,100% { transform: scale(1); } 50% { transform: scale(1.04); } }
@keyframes spinSlow { to { transform: rotate(360deg); } }
@keyframes rise { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }
.rise { animation: rise .4s ease both; }

/* floating energy particle burst */
.spark {
  position: absolute; font-family: var(--font-disp); font-weight: 700;
  pointer-events: none; z-index: 5;
  animation: sparkUp 1s ease-out forwards;
}
@keyframes sparkUp {
  0% { opacity: 0; transform: translate(-50%, 0) scale(0.6); }
  20% { opacity: 1; }
  100% { opacity: 0; transform: translate(-50%, -64px) scale(1.1); }
}

/* progress bars */
.bar-track { height: 10px; border-radius: 999px; background: var(--bg-2); overflow: hidden; }
.bar-fill { height: 100%; border-radius: 999px; transition: width .6s cubic-bezier(.3,.9,.3,1); }

.fade-page { animation: rise .35s ease both; }
  </style>
</head>

  <script type="text/babel" data-presets="react">
/* ============================================================
   data.jsx — 数据模型 · 能量计算 · 图标
   ============================================================ */

/* ---------- 马卡龙色板（用于分类自定义取色） ---------- */
const MACARON_SWATCHES = [
  '#F3A8BE', '#F6C4A0', '#F4DC97', '#C7E6A2', '#A6E0C8',
  '#A7D6EC', '#B7BFEE', '#D7B8E8', '#EFB0C6', '#9FD9CE',
  '#E8C7A0', '#C9C4B4',
];

/* ---------- 默认分类（用户可增/改/删） ---------- */
const DEFAULT_CATEGORIES = [
  { id: 'study',  label: '学习', color: '#B7BFEE' },
  { id: 'move',   label: '运动', color: '#A6E0C8' },
  { id: 'social', label: '社交', color: '#F3A8BE' },
  { id: 'hobby',  label: '兴趣', color: '#F4DC97' },
  { id: 'life',   label: '生活', color: '#C7E6A2' },
  { id: 'work',   label: '工作', color: '#A7D6EC' },
  { id: 'chore',  label: '琐事', color: '#D7C3AE' },
];

/* 分类 Context：list（有序）/ map（按 id 查）/ 增改删 */
const CatCtx = React.createContext({
  list: DEFAULT_CATEGORIES,
  map: Object.fromEntries(DEFAULT_CATEGORIES.map(c => [c.id, c])),
  addCat: () => {}, updateCat: () => {}, deleteCat: () => {},
});

/* ---------- 今日任务 ---------- */
/* 新用户从空任务开始（保留默认分类作为可编辑的起步脚手架） */
const SEED_TASKS = [];

/* ---------- 成就 ---------- */
const ACHIEVEMENTS = [
  { id: 'a1', name: '能量满格',   desc: '单日能量达到上限',          icon: 'sun',    got: true,  tint: '#EFC15E' },
  { id: 'a2', name: '晨型选手',   desc: '连续 5 天在 8 点前完成增能事', icon: 'sunrise', got: true,  tint: '#F0A878' },
  { id: 'a3', name: '心流时刻',   desc: '单日完成 3 件「兴趣」增能事',  icon: 'spark',  got: true,  tint: '#9A86E0' },
  { id: 'a4', name: '断舍离',     desc: '一天把耗能事控制在 10 以内',   icon: 'leaf',   got: false, tint: '#6FBF9A' },
  { id: 'a5', name: '七日连续',   desc: '连续 7 天记录能量',          icon: 'flame',  got: false, tint: '#EE8FA3' },
  { id: 'a6', name: '充电达人',   desc: '累计增能 1000',             icon: 'battery',got: false, tint: '#7FB7D8' },
];

/* ---------- 能量计算 ---------- */
const SCALE_MAX = 80; // 能量球“满格”的参考刻度（初始能量上限 50 + 当日增能空间）

function computeEnergy(tasks, initial) {
  let gain = 0, drain = 0;
  tasks.forEach(t => {
    if (!t.done) return;
    if (t.type === 'gain') gain += t.pts;
    else drain += t.pts;
  });
  const current = initial + gain - drain;
  return { current, gain, drain, net: gain - drain };
}

// 能量级别 → 马卡龙色 / 鼓励语
function energyMood(current) {
  const p = current;
  if (p >= 68) return { key: 'high',  msg: '今天的你光芒四射 ✨',     hint: '记得也给自己留一点放空的时间。', c1: '#B8EBD2', c2: '#79CBA4' };
  if (p >= 48) return { key: 'good',  msg: '保持这个节奏，很棒～',     hint: '你正在把时间花在让自己开心的事上。', c1: '#C7ECC0', c2: '#8FCF9E' };
  if (p >= 29) return { key: 'mid',   msg: '能量还够，慢慢来 🌿',      hint: '挑一件喜欢的小事，给自己充会儿电。', c1: '#FBE6A6', c2: '#F0C97C' };
  if (p >= 13) return { key: 'low',   msg: '有点累了，照顾好自己',     hint: '也许可以把耗能的事往后挪一挪。', c1: '#FBD7B0', c2: '#F0AE82' };
  return            { key: 'empty', msg: '慢一点也没关系 🫧',        hint: '今天先休息，明天又是满格的一天。', c1: '#F8C2CE', c2: '#EE93A6' };
}

function fillPct(current) {
  return Math.max(0, Math.min(1, current / SCALE_MAX));
}

/* ============================================================
   日期与历史（真实日期；历史来自数据库 daily_log，不再生成假数据）
   ============================================================ */
const _now = new Date();
const TODAY = { y: _now.getFullYear(), m: _now.getMonth() + 1, d: _now.getDate() };
const MONTH_LABELS = ['一月', '二月', '三月', '四月', '五月', '六月', '七月', '八月', '九月', '十月', '十一月', '十二月'];
const WEEKDAY_LABELS = ['日', '一', '二', '三', '四', '五', '六'];

const _pad = (n) => String(n).padStart(2, '0');
function ymdToIso(y, m, d) { return `${y}-${_pad(m)}-${_pad(d)}`; }   // 数据库 date 列用
function dKey(y, m, d) { return `${y}-${m}-${d}`; }                   // logMap 键（不补零）
function isoToKey(iso) { const [y, m, d] = iso.split('-').map(Number); return `${y}-${m}-${d}`; }
const TODAY_KEY = dKey(TODAY.y, TODAY.m, TODAY.d);
const TODAY_ISO = ymdToIso(TODAY.y, TODAY.m, TODAY.d);

function isFuture(y, m, d) {
  if (y !== TODAY.y) return y > TODAY.y;
  if (m !== TODAY.m) return m > TODAY.m;
  return d > TODAY.d;
}
function daysInMonth(y, m) { return new Date(y, m, 0).getDate(); }
function firstWeekday(y, m) { return new Date(y, m - 1, 1).getDay(); }

/* 最近 n 天（含今天），用于「能量趋势」 */
function recentDays(n) {
  const out = [];
  for (let i = n - 1; i >= 0; i--) {
    const dt = new Date(TODAY.y, TODAY.m - 1, TODAY.d - i);
    const y = dt.getFullYear(), m = dt.getMonth() + 1, d = dt.getDate();
    out.push({ y, m, d, key: dKey(y, m, d), wd: WEEKDAY_LABELS[dt.getDay()], isToday: i === 0 });
  }
  return out;
}

/* 连续记录天数（截止今天/昨天，从 logMap + 今天是否有记录推算） */
function computeStreak(logMap, todayActive) {
  let streak = 0;
  for (let i = 0; i < 400; i++) {
    const dt = new Date(TODAY.y, TODAY.m - 1, TODAY.d - i);
    const key = dKey(dt.getFullYear(), dt.getMonth() + 1, dt.getDate());
    const active = i === 0 ? todayActive : !!(logMap[key] && logMap[key].length);
    if (active) streak++;
    else if (i === 0) continue;   // 今天还没记录，不打断昨天起的连续
    else break;
  }
  return streak;
}

function aggTasks(tasks) {
  let gain = 0, drain = 0;
  tasks.forEach(t => { if (t.type === 'gain') gain += t.pts; else drain += t.pts; });
  return { gain, drain, net: gain - drain, count: tasks.length };
}
function monthAgg(y, m, tasksFor) {
  const dim = daysInMonth(y, m); let gain = 0, drain = 0, active = 0, best = null; const cat = {};
  const days = [];
  for (let d = 1; d <= dim; d++) {
    const future = isFuture(y, m, d);
    const ts = future ? [] : tasksFor(y, m, d);
    const a = aggTasks(ts);
    days.push({ d, future, ...a });
    if (!future && ts.length) {
      gain += a.gain; drain += a.drain; active++;
      if (!best || a.net > best.net) best = { d, net: a.net };
      ts.forEach(t => { if (t.type === 'gain') cat[t.cat] = (cat[t.cat] || 0) + t.pts; });
    }
  }
  return { gain, drain, net: gain - drain, active, best, cat, days };
}
function yearAgg(y, tasksFor) {
  let gain = 0, drain = 0, active = 0; const months = [];
  for (let m = 1; m <= 12; m++) {
    const s = monthAgg(y, m, tasksFor);
    months.push({ m, gain: s.gain, drain: s.drain, net: s.net, active });
    months[m - 1].active = s.active;
    gain += s.gain; drain += s.drain; active += s.active;
  }
  return { gain, drain, net: gain - drain, active, months };
}

/* ---------- 分值 → 颜色（不同分值取完全不同的马卡龙色） ---------- */
function ptsColor(pts) {
  const h = (pts * 41 + 20) % 360;   // 每个分值映射到独立色相
  return {
    base: `oklch(0.84 0.105 ${h})`,  // 主色：色条 / 勾选
    deep: `oklch(0.55 0.13 ${h})`,   // 深色：文字
    tint: `oklch(0.95 0.04 ${h})`,   // 浅底：徽标背景
  };
}

function Icon({ name, size = 22, stroke = 2, className, style }) {

    settings:<><circle cx="12" cy="12" r="3"/><path d="M12 2v3M12 19v3M4.9 4.9l2.1 2.1M17 17l2.1 2.1M2 12h3M19 12h3M4.9 19.1 7 17M17 7l2.1-2.1"/></>,
    plus:    <><path d="M12 5v14M5 12h14"/></>,
    sun:     <><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4 12H2M22 12h-2M5 5l1.5 1.5M17.5 17.5 19 19M19 5l-1.5 1.5M6.5 17.5 5 19"/></>,
    sunrise: <><path d="M12 3v5M5.5 9.5 4 8M18.5 9.5 20 8M3 16h18M5 20h14"/><path d="M8 16a4 4 0 0 1 8 0"/></>,
    spark:   <><path d="M12 3v4M12 17v4M3 12h4M17 12h4M6 6l2.5 2.5M15.5 15.5 18 18M18 6l-2.5 2.5M8.5 15.5 6 18"/><circle cx="12" cy="12" r="2.4"/></>,
    leaf:    <><path d="M11 20A7 7 0 0 1 4 13c0-5 5-9 16-9 0 11-4 16-9 16ZM4 20c4-6 8-8 13-9"/></>,
    flame:   <><path d="M12 22c4 0 7-2.7 7-7 0-3-2-5-3-7-.5 2-2 3-3 3 0-3-1-5-4-7 1 4-4 6-4 11 0 4.3 3 7 7 7Z"/></>,

/* ============================================================
   ball.jsx — 能量可视化：发光球体 · 液态波浪 · 环形仪表

/* ---- 数字滚动 ---- */
function useCountUp(value, ms = 700) {
  const [n, setN] = React.useState(value);
  const ref = React.useRef(value);
  React.useEffect(() => {
    const from = ref.current, to = value, start = performance.now();
    if (from === to) return;
    let raf;
    const tick = (t) => {
      const k = Math.min(1, (t - start) / ms);
      const e = 1 - Math.pow(1 - k, 3);
      setN(Math.round(from + (to - from) * e));
      if (k < 1) raf = requestAnimationFrame(tick); else ref.current = to;
    };
    raf = requestAnimationFrame(tick);
    return () => cancelAnimationFrame(raf);
  }, [value]);
  return n;
}

/* ============================================================
   发光球体 (方案 ①)
   ============================================================ */
function EnergyOrb({ current, size = 260, showLabel = true }) {
  const mood = energyMood(current);

      </svg>
      {/* sphere */}
      <div style={{
        position: 'relative', width: size * 0.78, height: size * 0.78, borderRadius: '50%',
        background: `radial-gradient(circle at 36% 30%, ${mood.c1}, ${mood.c2} 76%)`,

        <div style={{ position: 'relative', textAlign: 'center', color: '#fff', textShadow: '0 2px 10px rgba(0,0,0,0.18)' }}>

        </div>
      </div>
    </div>

/* ============================================================

   ============================================================ */

  const mood = energyMood(current);

          <div className="energy-num" style={{ fontSize: size * 0.26 }}>{n}</div>
          <div style={{ fontSize: 12, fontWeight: 600, letterSpacing: 3, opacity: .85 }}>能量值</div>
        </div>
      </div>
    </div>
  );
}

/* ============================================================
   环形仪表 (方案 ③)
   ============================================================ */
function RingGauge({ current, size = 200, stroke = 16 }) {
  const mood = energyMood(current);
  const n = useCountUp(current);
  const pct = fillPct(current);
  const r = (size - stroke) / 2;
  const c = 2 * Math.PI * r;
  const gapDeg = 90; // open arc bottom

  const dash = arc * pct;

  return (
    <div style={{ position: 'relative', width: size, height: size }}>
      <svg width={size} height={size} style={{ transform: 'rotate(135deg)' }}>

  );
}

/* ---------------- 弹窗 ---------------- */
function Modal({ children, onClose }) {
  React.useEffect(() => {
    const h = (e) => { if (e.key === 'Escape') onClose(); };
    window.addEventListener('keydown', h);
    return () => window.removeEventListener('keydown', h);
  }, []);
  return (
    <div className="overlay" onMouseDown={(e) => { if (e.target === e.currentTarget) onClose(); }}>
      <div className="modal">{children}</div>
    </div>
  );
}

/* ---------------- 小标题 ---------------- */
function SectionLabel({ children, right }) {

      {right}
    </div>
  );
}

/* ============================================================
   能量趋势
   ============================================================ */
function WeekChart({ data }) {
  const W = 720, H = 240, pad = 30, baseline = H * 0.62;
  const n = data.length;
  const step = (W - pad * 2) / n;
  const maxV = Math.max(...data.map(d => Math.max(d.gain || 0, d.drain || 0))) || 1;
  const scale = (baseline - 24) / maxV;
  const netPts = data.map((d, i) => {
    const x = pad + step * i + step / 2;
    const y = baseline - (d.net || 0) * ((H - baseline - 24) / maxV) - 0; // net relative
    return [x, baseline - (d.net || 0) * scale];
  });
  const linePath = netPts.map((p, i) => `${i ? 'L' : 'M'}${p[0]},${p[1]}`).join(' ');

  return (
    <svg viewBox={`0 0 ${W} ${H}`} width="100%" style={{ overflow: 'visible' }}>
      <line x1={pad} y1={baseline} x2={W - pad} y2={baseline} stroke="var(--line-2)" strokeWidth="1.5" />
      {data.map((d, i) => {
        const x = pad + step * i + step / 2;
        const live = d.live;
        const bw = 12;
        return (
          <g key={i}>
            {(d.gain > 0 || d.drain > 0) && <>
              <rect x={x - bw - 2} y={baseline - d.gain * scale} width={bw} height={d.gain * scale} rx="4" fill="var(--gain-2)" opacity={live ? 1 : 0.9} />
              <rect x={x + 2} y={baseline} width={bw} height={d.drain * scale} rx="4" fill="var(--drain-2)" opacity={live ? 1 : 0.9} />
            </>}
            <text x={x} y={H - 6} textAnchor="middle" fontSize="12" fontWeight={live ? 700 : 500} fill={live ? 'var(--gain)' : 'var(--ink-3)'} fontFamily="var(--font-body)">{d.day}</text>
          </g>
        );
      })}
      <path d={linePath} fill="none" stroke="var(--ink)" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round" opacity="0.75" />
      {netPts.map((p, i) => (
        <circle key={i} cx={p[0]} cy={p[1]} r={data[i].live ? 6 : 4} fill={data[i].live ? 'var(--gain)' : 'var(--surface)'} stroke="var(--ink)" strokeWidth="2" />
      ))}
    </svg>
  );
}

function Stats({ energy, tasks, logMap = {} }) {
  const { map: cmap } = React.useContext(CatCtx);
  const data = recentDays(7).map(dd => {

    const a = aggTasks(logMap[dd.key] || []);
    return { day: '周' + dd.wd, net: a.net, gain: a.gain, drain: a.drain, live: false };
  });
  const avg = Math.round(data.reduce((s, d) => s + d.net, 0) / data.length);
  const best = data.reduce((a, b) => b.net > a.net ? b : a);
  // category distribution (gain only)

  tasks.forEach(t => { if (t.type === 'gain') catAgg[t.cat] = (catAgg[t.cat] || 0) + t.pts; });

        <StatCard label="能量最佳日" value={best.day} sub={`+${best.net} 净能量`} tint="var(--amber)" />

              <div key={k} style={{ display: 'flex', alignItems: 'center', gap: 14 }}>
                <div style={{ width: 56, fontSize: 13, fontWeight: 600, color: 'var(--ink-2)' }}>{cmap[k].label}</div>

                <div style={{ width: 40, textAlign: 'right', fontFamily: 'var(--font-disp)', fontWeight: 600, color: cmap[k].color }}>+{v}</div>
              </div>
            ))}
          </div>}
      </div>
    </div>
  );
}

/* ============================================================
   成就
   ============================================================ */
function Achievements({ logMap = {}, tasks = [] }) {
  // 全部基于真实记录计算，新账号从 0 开始
  const todayDone = tasks.filter(t => t.done);
  const days = Object.values(logMap).filter(ts => ts && ts.length);
  if (todayDone.length) days.push(todayDone);
  let totalGain = 0, maxNet = 0, maxGainCount = 0, lowDrainDay = false;
  days.forEach(ts => {
    const a = aggTasks(ts);
    totalGain += a.gain;
    maxNet = Math.max(maxNet, a.net);
    maxGainCount = Math.max(maxGainCount, ts.filter(t => t.type === 'gain').length);
    if (a.drain <= 10) lowDrainDay = true;
  });
  const activeDays = days.length;
  const streak = computeStreak(logMap, todayDone.length > 0);

  const list = [
    { id: 'a1', name: '净值高峰', desc: '单日净能量达到 30', icon: 'sun',     tint: '#EFC15E', got: maxNet >= 30 },
    { id: 'a2', name: '坚持记录', desc: '累计记录满 3 天',   icon: 'sunrise', tint: '#F0A878', got: activeDays >= 3 },
    { id: 'a3', name: '增能时刻', desc: '单日完成 5 件增能事', icon: 'spark',   tint: '#9A86E0', got: maxGainCount >= 5 },
    { id: 'a4', name: '断舍离',   desc: '某天把耗能控制在 10 以内', icon: 'leaf', tint: '#6FBF9A', got: lowDrainDay },
    { id: 'a5', name: '七日连续', desc: '连续记录 7 天',     icon: 'flame',   tint: '#EE8FA3', got: streak >= 7 },
    { id: 'a6', name: '充电达人', desc: '累计增能 1000',     icon: 'battery', tint: '#7FB7D8', got: totalGain >= 1000 },
  ];
  const got = list.filter(a => a.got).length;

  const bannerTitle = streak > 0 ? `连续记录 ${streak} 天 🔥` : '今天，就是第一天 🌱';
  const bannerSub = streak === 0 ? '完成第一件事，点亮属于你的第一天。'
    : streak < 7 ? `再坚持 ${7 - streak} 天就能解锁「七日连续」，你做得很好。`
    : '你已经把记录变成了习惯，太棒了。';

  return (
    <div className="fade-page">
      <div className="topbar"><div><div className="greeting">成就</div><div className="subgreet">每一点积累，都是对自己的温柔。</div></div>
        <div className="date-pill">已解锁 {got} / {list.length}</div></div>

      <div className="card card-pad" style={{ marginBottom: 18, display: 'flex', alignItems: 'center', gap: 20, background: 'linear-gradient(120deg, var(--amber-tint), var(--surface))' }}>
        <div style={{ width: 64, height: 64, borderRadius: '50%', background: 'radial-gradient(circle at 36% 30%, var(--amber-2), var(--amber))', display: 'grid', placeItems: 'center', boxShadow: '0 8px 22px rgba(232,163,61,0.4)', color: '#fff' }}><Icon name="flame" size={30} /></div>
        <div>
          <div style={{ fontFamily: 'var(--font-round)', fontSize: 22 }}>{bannerTitle}</div>
          <div style={{ color: 'var(--ink-2)', fontSize: 14, marginTop: 4 }}>{bannerSub}</div>
        </div>
      </div>

      <div style={{ display: 'grid', gridTemplateColumns: 'repeat(3,1fr)', gap: 16 }}>
        {list.map((a, i) => (
          <div key={a.id} className="card card-pad rise" style={{ animationDelay: `${i*0.05}s`, textAlign: 'center', opacity: a.got ? 1 : 0.62, filter: a.got ? 'none' : 'grayscale(0.5)' }}>
            <div style={{ width: 60, height: 60, borderRadius: '50%', margin: '0 auto 14px', display: 'grid', placeItems: 'center', color: '#fff',
              background: a.got ? `radial-gradient(circle at 36% 30%, ${a.tint}, ${a.tint})` : 'var(--bg-2)' }}>
              <Icon name={a.icon} size={28} stroke={2} style={a.got ? null : { color: 'var(--ink-3)' }} />
            </div>
            <div style={{ fontWeight: 700, fontSize: 16 }}>{a.name}</div>
            <div style={{ fontSize: 13, color: 'var(--ink-2)', marginTop: 6 }}>{a.desc}</div>
            {!a.got && <div style={{ fontSize: 12, color: 'var(--ink-3)', marginTop: 10, fontWeight: 600 }}>未解锁</div>}
          </div>
        ))}
      </div>
    </div>
  );
}

/* 净能量 → 马卡龙底色 + 文字色 */
function netColor(net, has) {
  if (!has) return { bg: 'var(--surface-2)', fg: 'var(--ink-3)', border: 'var(--line)' };
  if (net > 0) { const i = Math.min(1, net / 28); return { bg: `oklch(${0.955 - 0.10 * i} ${0.05 + 0.07 * i} 158)`, fg: 'var(--gain)', border: 'transparent' }; }
  if (net < 0) { const i = Math.min(1, -net / 28); return { bg: `oklch(${0.955 - 0.08 * i} ${0.05 + 0.07 * i} 18)`, fg: 'var(--drain)', border: 'transparent' }; }
  return { bg: 'var(--bg-2)', fg: 'var(--ink-2)', border: 'transparent' };
}
function weekdayOf(y, m, d) { return WEEKDAY_LABELS[new Date(y, m - 1, d).getDay()]; }

/* ---- 类别分布条 ---- */
function CatBreakdown({ cat }) {
  const { map } = React.useContext(CatCtx);
  const list = Object.entries(cat).filter(([k]) => map[k]).sort((a, b) => b[1] - a[1]);
  const max = Math.max(...list.map(c => c[1]), 1);
  if (!list.length) return <div style={{ color: 'var(--ink-3)', fontSize: 14 }}>暂无增能记录</div>;

    <div style={{ display: 'flex', flexDirection: 'column', gap: 13 }}>

        <div key={k} style={{ display: 'flex', alignItems: 'center', gap: 14 }}>

  );
}

function Summary({ energy, tasks, logMap = {} }) {
  const [level, setLevel] = React.useState('today');

  const [selMonth, setSelMonth] = React.useState(TODAY.m);
  const [day, setDay] = React.useState(null);

  const liveDone = React.useMemo(() => tasks.filter(t => t.done), [tasks]);
  const tasksFor = React.useCallback((y, m, d) =>
    (y === TODAY.y && m === TODAY.m && d === TODAY.d) ? liveDone : (logMap[dKey(y, m, d)] || []), [liveDone, logMap]);

  const go = (lv) => { setLevel(lv); setSelYear(TODAY.y); setSelMonth(TODAY.m); setDay(null); };

  const monthCanNext = !(selYear === TODAY.y && selMonth >= TODAY.m);
  const yearCanNext = selYear < TODAY.y;
  const prevMonth = () => { if (selMonth === 1) { setSelMonth(12); setSelYear(y => y - 1); } else setSelMonth(mo => mo - 1); };
  const nextMonth = () => { if (!monthCanNext) return; if (selMonth === 12) { setSelMonth(1); setSelYear(y => y + 1); } else setSelMonth(mo => mo + 1); };

  return (
    <div>
      <div className="topbar">
        <div><div className="greeting">总结</div><div className="subgreet">慢下来，回看你的能量故事。</div></div>

            <button key={k} className={`seg-btn ${level === k ? 'active' : ''}`} onClick={() => go(k)}>{l}</button>
          ))}
        </div>
      </div>

      {level === 'today' && <TodayView energy={energy} tasks={tasks} />}

      {level === 'month' &&
        <MonthView y={selYear} m={selMonth} tasksFor={tasksFor} canNext={monthCanNext}
          onPickDay={(d) => setDay(d)} onBack={() => setLevel('year')} onPrev={prevMonth} onNext={nextMonth} />}

      {level === 'year' &&
        <YearView y={selYear} tasksFor={tasksFor} canNext={yearCanNext}
          onPickMonth={(m) => { setSelMonth(m); setLevel('month'); }}
          onPrev={() => setSelYear(y => y - 1)} onNext={() => yearCanNext && setSelYear(y => y + 1)} />}

      {day != null &&
        <DayDetailModal y={selYear} m={selMonth} d={day} tasks={tasksFor(selYear, selMonth, day)} onClose={() => setDay(null)} />}
    </div>
  );
}

  <!-- ==== app.jsx ==== -->
  <script type="text/babel" data-presets="react">
/* ============================================================
   app.jsx — 状态 · 路由 · 持久化 · 能量反馈动效
   ============================================================ */
const { useState, useEffect, useCallback, useRef } = React;

const LS = {
  get(k, d) { try { const v = localStorage.getItem(k); return v == null ? d : JSON.parse(v); } catch { return d; } },
  set(k, v) { try { localStorage.setItem(k, JSON.stringify(v)); } catch {} },
  del(k) { try { localStorage.removeItem(k); } catch {} },
};
const clampInit = (v) => Math.min(50, Math.max(10, typeof v === 'number' ? v : 30));

/* ============================================================
   ☁  云端：Supabase 客户端 + 每用户整份状态读写
   未配置时 SB = null → 自动「本地模式」
   ============================================================ */
const SB_CFG = window.SUPABASE_CONFIG || {};
const SB_READY = !!(SB_CFG.url && SB_CFG.anonKey && !/^YOUR_/.test(SB_CFG.url) && !/^YOUR_/.test(SB_CFG.anonKey) && window.supabase);
const SB = SB_READY ? window.supabase.createClient(SB_CFG.url, SB_CFG.anonKey) : null;

async function saveRemoteState(userId, state) {
  const row = { user_id: userId, tasks: state.tasks, cats: state.cats, initial: state.initial, updated_at: new Date().toISOString() };
  if (state.lastDate) row.last_date = state.lastDate;
  const { error } = await SB.from('user_state').upsert(row, { onConflict: 'user_id' });
  if (error) { console.warn('[sync] save 失败', error.message); throw error; }
}
async function loadRemoteState(userId) {
  const { data, error } = await SB.from('user_state').select('tasks, cats, initial, last_date').eq('user_id', userId).maybeSingle();
  if (error) { console.warn('[sync] load 失败', error.message); throw error; }
  return data;
}

/* daily_log：每个已结算的日期一行 */
async function loadRemoteLog(userId) {
  const { data, error } = await SB.from('daily_log').select('date, tasks').eq('user_id', userId);
  if (error) { console.warn('[sync] log load 失败', error.message); throw error; }
  const map = {};
  (data || []).forEach(r => { map[isoToKey(r.date)] = r.tasks || []; });
  return map;
}
async function saveRemoteLogDay(userId, iso, tasks, agg) {
  const { error } = await SB.from('daily_log').upsert(
    { user_id: userId, date: iso, tasks, gain: agg.gain, drain: agg.drain, net: agg.net },
    { onConflict: 'user_id,date' }
  );
  if (error) { console.warn('[sync] log save 失败', error.message); throw error; }
}

/* 纯函数：判断是否需要翻篇，返回 {archive?, newTasks, archivedKey?, archivedIso?} */
function planRollover(prevTasks, lastDateIso) {
  // 首次（无 last_date）：不归档，只把今天定为活动日
  if (!lastDateIso || lastDateIso === TODAY_ISO) return { changed: false, newTasks: prevTasks };
  // 跨天了：把上一活动日的「已完成」任务归档，未完成的顺延到今天
  const done = prevTasks.filter(t => t.done);
  const carry = prevTasks.filter(t => !t.done).map(t => ({ ...t, done: false }));
  return {
    changed: true,
    archivedIso: lastDateIso,
    archivedKey: isoToKey(lastDateIso),
    archivedTasks: done,
    archivedAgg: aggTasks(done),
    newTasks: carry,
  };
}
function friendlyAuthError(msg) {
  if (!msg) return '出了点问题，请重试。';
  if (/Invalid login credentials/i.test(msg)) return '邮箱或密码不正确。';
  if (/already registered|already been registered/i.test(msg)) return '该邮箱已注册，请直接登录。';
  if (/Password should be at least/i.test(msg)) return '密码至少需要 6 位。';
  if (/Unable to validate email|invalid format/i.test(msg)) return '邮箱格式不正确。';
  if (/Email not confirmed/i.test(msg)) return '邮箱还未确认，请先点开邮件里的确认链接。';
  return msg;
}

function App({ session }) {
  const cloud = !!(SB && session);
  const userId = cloud ? session.user.id : 'local';
  const K = (k) => `et_${k}_${userId}`;

  const [tasks, setTasks]     = useState(() => LS.get(K('tasks'), SEED_TASKS));
  const [initial, setInitial] = useState(() => clampInit(LS.get(K('initial'), 30)));
  const [cats, setCats]       = useState(() => { const c = LS.get(K('cats'), DEFAULT_CATEGORIES); return Array.isArray(c) && c.length ? c : DEFAULT_CATEGORIES; });
  const [logMap, setLogMap]   = useState(() => LS.get(K('log'), {}));      // { 'y-m-d': [完成任务...] }
  const [lastDate, setLastDate] = useState(() => LS.get(K('lastDate'), null)); // ISO 'YYYY-MM-DD'
  const [route, setRoute]     = useState(() => { const r = LS.get('et_route', 'today'); return r === 'review' ? 'summary' : r; });
  const [variant, setVariant] = useState(() => LS.get('et_variant', 'orb'));
  const [modal, setModal]     = useState(null);   // null | {} (new) | task (edit)
  const [sparks, setSparks]   = useState([]);
  const [sync, setSync]       = useState(cloud ? 'loading' : 'local'); // loading | saving | synced | local | error

  const hydrated = useRef(false);
  const saveTimer = useRef(null);

  /* ---- 进入时：拉取状态 + 历史，并执行「跨天结算」---- */
  useEffect(() => {
    let alive = true;
    hydrated.current = false;
    if (cloud) setSync('loading');
    (async () => {
      try {
        let curTasks, curCats, curInitial, curLast, log;
        if (cloud) {
          const remote = await loadRemoteState(userId);
          log = await loadRemoteLog(userId);
          if (remote) {
            curTasks   = Array.isArray(remote.tasks) ? remote.tasks : [];
            curCats    = Array.isArray(remote.cats) && remote.cats.length ? remote.cats : DEFAULT_CATEGORIES;
            curInitial = clampInit(remote.initial);
            curLast    = remote.last_date || null;
          } else {
            curTasks = []; curCats = DEFAULT_CATEGORIES; curInitial = clampInit(initial); curLast = null; // 首次登录：干净起步
          }
        } else {
          curTasks = tasks; curCats = cats; curInitial = initial; curLast = lastDate; log = { ...logMap };
        }

        const lastIso = curLast ? String(curLast).slice(0, 10) : null;
        const plan = planRollover(curTasks, lastIso);
        if (plan.changed) {
          log = { ...log, [plan.archivedKey]: plan.archivedTasks };
          curTasks = plan.newTasks;
          if (cloud && plan.archivedTasks.length) await saveRemoteLogDay(userId, plan.archivedIso, plan.archivedTasks, plan.archivedAgg);
        }
        if (!alive) return;
        setTasks(curTasks); setCats(curCats); setInitial(curInitial); setLogMap(log); setLastDate(TODAY_ISO);
        if (cloud) await saveRemoteState(userId, { tasks: curTasks, cats: curCats, initial: curInitial, lastDate: TODAY_ISO });
        hydrated.current = true;
        setSync(cloud ? 'synced' : 'local');
      } catch (e) {
        if (alive) { hydrated.current = true; setSync(cloud ? 'error' : 'local'); }
      }
    })();
    return () => { alive = false; };
  }, [userId, cloud]);

  /* ---- 跨午夜仍开着：检测到日期变化就刷新，让结算逻辑重新跑 ---- */
  useEffect(() => {
    const check = () => {
      const n = new Date();
      if (ymdToIso(n.getFullYear(), n.getMonth() + 1, n.getDate()) !== TODAY_ISO) window.location.reload();
    };
    document.addEventListener('visibilitychange', check);
    window.addEventListener('focus', check);
    const t = setInterval(check, 60000);
    return () => { document.removeEventListener('visibilitychange', check); window.removeEventListener('focus', check); clearInterval(t); };
  }, []);

  /* ---- 本地缓存（即时、断网也能看）---- */
  useEffect(() => { LS.set(K('tasks'), tasks); }, [tasks]);
  useEffect(() => { LS.set(K('initial'), initial); }, [initial]);
  useEffect(() => { LS.set(K('cats'), cats); }, [cats]);
  useEffect(() => { LS.set(K('log'), logMap); }, [logMap]);
  useEffect(() => { LS.set(K('lastDate'), lastDate); }, [lastDate]);
  useEffect(() => LS.set('et_route', route), [route]);
  useEffect(() => LS.set('et_variant', variant), [variant]);

  /* ---- 防抖云端同步（user_state）---- */
  useEffect(() => {
    if (!cloud || !hydrated.current) return;
    setSync('saving');
    clearTimeout(saveTimer.current);
    saveTimer.current = setTimeout(async () => {
      try { await saveRemoteState(userId, { tasks, cats, initial, lastDate }); setSync('synced'); }
      catch { setSync('error'); }
    }, 700);
    return () => clearTimeout(saveTimer.current);
  }, [tasks, cats, initial, cloud]);

  const signOut = useCallback(() => { if (SB) SB.auth.signOut(); }, []);

  /* ---- 分类增改删 ---- */
  const addCat = useCallback((label, color) => {
    const id = 'c' + Date.now().toString(36);
    setCats(prev => [...prev, { id, label, color }]);
    return id;
  }, []);
  const updateCat = useCallback((id, patch) => setCats(prev => prev.map(c => c.id === id ? { ...c, ...patch } : c)), []);
  const deleteCat = useCallback((id) => setCats(prev => prev.length > 1 ? prev.filter(c => c.id !== id) : prev), []);
  const catCtxValue = React.useMemo(() => ({
    list: cats,
    map: Object.fromEntries(cats.map(c => [c.id, c])),
    addCat, updateCat, deleteCat,
  }), [cats, addCat, updateCat, deleteCat]);

  const energy = computeEnergy(tasks, initial);

  const fireSpark = (task, e) => {
    const id = Date.now() + Math.random();
    const x = e ? e.clientX : window.innerWidth / 2;
    const y = e ? e.clientY : 120;
    const text = (task.type === 'gain' ? '+' : '−') + task.pts;
    const color = task.type === 'gain' ? 'var(--gain)' : 'var(--drain)';
    setSparks(s => [...s, { id, x, y, text, color }]);
    setTimeout(() => setSparks(s => s.filter(k => k.id !== id)), 1000);
  };

  const onToggle = useCallback((id, e) => {
    setTasks(prev => prev.map(t => {
      if (t.id !== id) return t;
      const nt = { ...t, done: !t.done };
      if (nt.done) fireSpark(nt, e);
      return nt;
    }));
  }, []);

  const onSave = (data) => {
    if (data.id) setTasks(prev => prev.map(t => t.id === data.id ? { ...t, ...data } : t));
    else setTasks(prev => [...prev, { ...data, id: 'u' + Date.now(), done: false }]);
    setModal(null);
  };
  const onQuickAdd = (data) => setTasks(prev => [...prev, { ...data, id: 'u' + Date.now(), done: false }]);
  const onDelete = (id) => { setTasks(prev => prev.filter(t => t.id !== id)); setModal(null); };

  const homeProps = { tasks, energy, variant, setVariant, onToggle, onEdit: setModal, onDelete, onAdd: onQuickAdd };

  return (
    <CatCtx.Provider value={catCtxValue}>
    <div className="app">
      <Sidebar route={route} setRoute={setRoute} energy={energy} onAdd={() => setModal({})}
        account={cloud ? { email: session.user.email, sync, onSignOut: signOut } : (SB ? null : { local: true })} />
      <main className="main scroll">
        <div className="main-inner">
          {route === 'today'    && <Home {...homeProps} />}
          {route === 'stats'    && <Stats energy={energy} tasks={tasks} logMap={logMap} />}
          {route === 'summary'  && <Summary energy={energy} tasks={tasks} logMap={logMap} />}
          {route === 'achieve'  && <Achievements logMap={logMap} tasks={tasks} />}
          {route === 'settings' && <Settings initial={initial} setInitial={setInitial} />}
        </div>
      </main>

      {modal && <TaskModal initial={modal} onSave={onSave} onClose={() => setModal(null)} onDelete={onDelete} />}

      {sparks.map(s => (
        <div key={s.id} className="spark" style={{ left: s.x, top: s.y, color: s.color, fontSize: 26 }}>{s.text}</div>
      ))}
    </div>
    </CatCtx.Provider>
  );
}

/* ============================================================
   认证：登录 / 注册界面（马卡龙风格）
   ============================================================ */
function AuthScreen() {
  const [mode, setMode]   = useState('signin'); // signin | signup
  const [email, setEmail] = useState('');
  const [pw, setPw]       = useState('');
  const [busy, setBusy]   = useState(false);
  const [err, setErr]     = useState(null);
  const [msg, setMsg]     = useState(null);

  const submit = async () => {
    setErr(null); setMsg(null);
    if (!email.trim() || !pw) { setErr('请填写邮箱和密码。'); return; }
    setBusy(true);
    try {
      if (mode === 'signin') {
        const { error } = await SB.auth.signInWithPassword({ email: email.trim(), password: pw });
        if (error) throw error;
      } else {
        const { data, error } = await SB.auth.signUp({ email: email.trim(), password: pw });
        if (error) throw error;
        if (!data.session) { setMsg('注册成功！请到邮箱点击确认链接，然后回来登录。'); setMode('signin'); }
      }
    } catch (e) { setErr(friendlyAuthError(e.message)); }
    finally { setBusy(false); }
  };

  const inp = { width: '100%', padding: '13px 16px', border: '1.5px solid var(--line-2)', borderRadius: 'var(--r-sm)', fontSize: 15, outline: 'none', background: 'var(--surface-2)' };

  return (
    <div style={{ minHeight: '100vh', display: 'grid', placeItems: 'center', padding: 24,
      background: 'radial-gradient(900px 600px at 15% -8%, rgba(166,224,200,0.32), transparent 60%), radial-gradient(820px 600px at 105% 4%, rgba(243,168,190,0.28), transparent 55%), radial-gradient(700px 600px at 60% 112%, rgba(183,191,238,0.24), transparent 55%), var(--bg)' }}>
      <div className="card" style={{ width: '100%', maxWidth: 410, padding: '38px 34px', borderRadius: 'var(--r-xl)', boxShadow: 'var(--sh-lg)' }}>
        <div style={{ display: 'flex', flexDirection: 'column', alignItems: 'center', textAlign: 'center', marginBottom: 26 }}>
          <div style={{ width: 64, height: 64, borderRadius: '50%', marginBottom: 16,
            background: 'radial-gradient(circle at 36% 30%, #FBE6A6, #F0C97C 78%)',
            boxShadow: '0 12px 30px rgba(240,201,124,0.45), inset 0 8px 18px rgba(255,255,255,0.5)' }} />
          <div style={{ fontFamily: 'var(--font-round)', fontSize: 26, color: 'var(--ink)' }}>INTJ能量板</div>
          <div style={{ fontSize: 14, color: 'var(--ink-2)', marginTop: 6 }}>
            {mode === 'signin' ? '欢迎回来，继续记录你的能量。' : '创建账号，开始记录你的能量。'}
          </div>
        </div>

        <div className="seg" style={{ width: '100%', marginBottom: 20, boxShadow: 'none', border: '1px solid var(--line)' }}>
          <button className={`seg-btn ${mode === 'signin' ? 'active' : ''}`} style={{ flex: 1 }} onClick={() => { setMode('signin'); setErr(null); setMsg(null); }}>登录</button>
          <button className={`seg-btn ${mode === 'signup' ? 'active' : ''}`} style={{ flex: 1 }} onClick={() => { setMode('signup'); setErr(null); setMsg(null); }}>注册</button>
        </div>

        <div style={{ display: 'flex', flexDirection: 'column', gap: 14 }}>
          <input style={inp} type="email" autoComplete="email" placeholder="邮箱" value={email}
            onChange={e => setEmail(e.target.value)} onKeyDown={e => e.key === 'Enter' && submit()} />
          <input style={inp} type="password" autoComplete={mode === 'signin' ? 'current-password' : 'new-password'}
            placeholder={mode === 'signin' ? '密码' : '密码（至少 6 位）'} value={pw}
            onChange={e => setPw(e.target.value)} onKeyDown={e => e.key === 'Enter' && submit()} />

          {err && <div style={{ fontSize: 13, color: 'var(--drain)', background: 'var(--drain-tint)', padding: '9px 13px', borderRadius: 'var(--r-sm)' }}>{err}</div>}
          {msg && <div style={{ fontSize: 13, color: 'var(--gain)', background: 'var(--gain-tint)', padding: '9px 13px', borderRadius: 'var(--r-sm)' }}>{msg}</div>}

          <button className="btn btn-gain btn-lg" style={{ width: '100%', marginTop: 4, opacity: busy ? 0.65 : 1, pointerEvents: busy ? 'none' : 'auto' }} onClick={submit}>
            {busy ? '请稍候…' : (mode === 'signin' ? '登录' : '注册')}
          </button>
        </div>

        <div style={{ textAlign: 'center', fontSize: 13, color: 'var(--ink-3)', marginTop: 20 }}>
          {mode === 'signin'
            ? <>还没有账号？<button style={{ color: 'var(--gain)', fontWeight: 700 }} onClick={() => { setMode('signup'); setErr(null); setMsg(null); }}>去注册</button></>
            : <>已有账号？<button style={{ color: 'var(--gain)', fontWeight: 700 }} onClick={() => { setMode('signin'); setErr(null); setMsg(null); }}>去登录</button></>}
        </div>
      </div>
    </div>
  );
}

function Splash() {
  return (
    <div style={{ minHeight: '100vh', display: 'grid', placeItems: 'center', background: 'var(--bg)' }}>
      <div style={{ textAlign: 'center' }}>
        <div style={{ width: 56, height: 56, borderRadius: '50%', margin: '0 auto 16px',
          background: 'radial-gradient(circle at 36% 30%, #FBE6A6, #F0C97C 78%)',
          boxShadow: '0 12px 30px rgba(240,201,124,0.45)', animation: 'pulseGlow 1.4s ease-in-out infinite' }} />
        <div style={{ fontFamily: 'var(--font-round)', fontSize: 18, color: 'var(--ink-2)' }}>正在载入你的能量…</div>
      </div>
    </div>
  );
}

/* ============================================================
   Root：决定显示 登录 / 应用 / 本地模式
   ============================================================ */
function Root() {
  const [session, setSession] = useState(undefined); // undefined = 还在确认登录态

  useEffect(() => {
    if (!SB) return;
    SB.auth.getSession().then(({ data }) => setSession(data.session));
    const { data: sub } = SB.auth.onAuthStateChange((_e, s) => setSession(s));
    return () => sub.subscription.unsubscribe();
  }, []);

  if (!SB) return <App session={null} />;          // 未配置 → 本地模式
  if (session === undefined) return <Splash />;     // 确认登录态中
  if (!session) return <AuthScreen />;              // 未登录
  return <App session={session} />;                 // 已登录 → 云端模式
}

ReactDOM.createRoot(document.getElementById('root')).render(<Root />);

  </script>

</body>
